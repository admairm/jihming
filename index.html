<title>今彩539 財神爺到 專業報牌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red:  #c0181e;
    --red2: #8b0000;
    --gold: #f5c518;
    --gold2:#e0a800;
    --gold3:#fff3b0;
    --dark: #1a0000;
    --text: #fff8e7;
  }
  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }
  .header-cta {
    width: 100%;
    background: linear-gradient(135deg, var(--red2) 0%, var(--red) 50%, #a01010 100%);
    padding: 14px 16px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    color: #1a0000;
    background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: 1.55rem;
    letter-spacing: 0.06em;
    padding: 22px 36px;
    border-radius: 60px;
    box-shadow: 0 0 36px rgba(245,197,24,0.95), 0 6px 24px rgba(0,0,0,0.5);
    animation: pulseGold 2s ease-in-out infinite;
    border: 3px solid #fff8c0;
    width: 100%;
    max-width: 480px;
  }
  .coins-bar {
    width: 100%;
    background: linear-gradient(90deg, var(--red2), var(--red), var(--red2));
    padding: 5px 0;
    text-align: center;
    font-size: 1.3rem;
    letter-spacing: 6px;
    white-space: nowrap;
    overflow: hidden;
  }
  .coins-bar span {
    display: inline-block;
    animation: slideCoin 5s linear infinite;
  }
  .ad-section {
    width: 100%;
    display: block;
    line-height: 0;
  }
  .ad-section img {
    width: 100%;
    height: auto;
    display: block;
  }
  .footer-cta {
    width: 100%;
    background: linear-gradient(135deg, #8b0000 0%, var(--red) 50%, var(--red2) 100%);
    padding: 22px 16px 32px;
    text-align: center;
    border-top: 3px solid var(--gold);
    box-shadow: 0 -4px 30px rgba(0,0,0,0.6);
  }
  .footer-cta .tagline {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem;
    color: var(--gold3);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    opacity: 0.9;
  }
  .footer-cta .sub {
    margin-top: 12px;
    font-size: 0.72rem;
    color: rgba(255,243,176,0.55);
    letter-spacing: 0.05em;
  }
  @keyframes slideCoin {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes pulseGold {
    0%, 100% { box-shadow: 0 0 20px rgba(245,197,24,0.7), 0 4px 12px rgba(0,0,0,0.4); transform: scale(1); }
    50%       { box-shadow: 0 0 42px rgba(245,197,24,1),   0 6px 20px rgba(0,0,0,0.5); transform: scale(1.025); }
  }
</style>
</head>
